name: Test Workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Run Maven tests
        run: |
          mvn clean test

      - name: Build project
        run: |
          mvn clean package

      - name: Test step - Print message
        run: echo "✅ Build and tests completed successfully!"
